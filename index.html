<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skin AI — Micro-services</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">
  <div class="max-w-3xl mx-auto space-y-8">
    <header>
      <h1 class="text-2xl font-bold text-emerald-400">Skin AI</h1>
      <p class="text-slate-500 text-sm">Auth JWT · API REST · ML · RabbitMQ · Consul · Traefik</p>
    </header>

    <section id="authPanel" class="rounded-xl border border-slate-800 bg-slate-900 p-6 space-y-4">
      <h2 class="font-semibold">Connexion / Inscription</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="text-sm text-slate-400">Email</label>
          <input id="email" type="email" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" placeholder="user@mail.com" />
        </div>
        <div class="space-y-2">
          <label class="text-sm text-slate-400">Mot de passe</label>
          <input id="password" type="password" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
        </div>
        <div class="space-y-2">
          <label class="text-sm text-slate-400">Rôle (inscription)</label>
          <select id="role" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button type="button" id="btnLogin" class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2 font-medium">Se connecter</button>
        <button type="button" id="btnRegister" class="rounded-lg border border-slate-600 px-4 py-2">S’inscrire</button>
        <button type="button" id="btnLogout" class="rounded-lg text-slate-500 hover:text-white">Déconnexion</button>
      </div>
      <p id="authStatus" class="text-sm text-slate-500"></p>
    </section>

    <section id="appPanel" class="hidden rounded-xl border border-slate-800 bg-slate-900 p-6 space-y-6">
      <h2 class="font-semibold">Patients (CRUD)</h2>
      <div class="flex gap-2">
        <input id="pName" placeholder="Nom du patient" class="flex-1 rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
        <input id="pNotes" placeholder="Notes" class="flex-1 rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
        <button type="button" id="btnAddPatient" class="rounded-lg bg-emerald-600 px-4 py-2">Ajouter</button>
      </div>
      <ul id="patientList" class="space-y-2 text-sm"></ul>

      <h2 class="font-semibold pt-4">Nouvelle analyse (file → RabbitMQ → worker → ML)</h2>
      <div class="flex flex-wrap gap-2 items-end">
        <div>
          <label class="text-xs text-slate-500">Patient ID</label>
          <input id="anaPatient" type="number" class="w-24 rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
        </div>
        <input id="anaFile" type="file" accept="image/*" class="text-sm" />
        <button type="button" id="btnAnalyze" class="rounded-lg bg-emerald-600 px-4 py-2">Envoyer</button>
      </div>

      <h2 class="font-semibold pt-4">Analyses</h2>
      <button type="button" id="btnRefresh" class="text-sm text-emerald-400 hover:underline">Rafraîchir</button>
      <ul id="analysisList" class="space-y-3 text-sm"></ul>
    </section>

    <footer class="text-xs text-slate-600">
      Traefik : <a class="text-emerald-500" href="http://localhost:8080">dashboard</a> ·
      Consul : <a class="text-emerald-500" href="http://localhost:8500">UI</a> ·
      RabbitMQ : <a class="text-emerald-500" href="http://localhost:15672">management</a> (skin / skin_secret)
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const token = () => localStorage.getItem("access_token");

    function authHeaders() {
      const t = token();
      const h = { "Content-Type": "application/json" };
      if (t) h["Authorization"] = "Bearer " + t;
      return h;
    }

    async function login() {
      const body = new URLSearchParams();
      body.append("username", $("email").value.trim());
      body.append("password", $("password").value);
      const r = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      });
      if (!r.ok) {
        $("authStatus").textContent = "Échec connexion";
        return;
      }
      const data = await r.json();
      localStorage.setItem("access_token", data.access_token);
      $("authStatus").textContent = "Connecté.";
      $("appPanel").classList.remove("hidden");
      loadAll();
    }

    async function register() {
      const r = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: $("email").value.trim(),
          password: $("password").value,
          role: $("role").value,
        }),
      });
      $("authStatus").textContent = r.ok ? "Compte créé — connectez-vous." : await r.text();
    }

    function logout() {
      localStorage.removeItem("access_token");
      $("appPanel").classList.add("hidden");
      $("authStatus").textContent = "Déconnecté.";
    }

    async function loadPatients() {
      const r = await fetch("/api/v1/patients", { headers: authHeaders() });
      if (r.status === 401) return logout();
      const rows = await r.json();
      $("patientList").innerHTML = rows
        .map((p) => `<li class="border border-slate-800 rounded p-2">#${p.id} — ${p.name} <span class="text-slate-500">(${p.notes || "—"})</span></li>`)
        .join("") || "<li>Aucun patient</li>";
    }

    async function addPatient() {
      const r = await fetch("/api/v1/patients", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ name: $("pName").value, notes: $("pNotes").value || null }),
      });
      if (!r.ok) return alert(await r.text());
      $("pName").value = "";
      $("pNotes").value = "";
      loadPatients();
    }

    async function loadAnalyses() {
      const r = await fetch("/api/v1/analyses", { headers: authHeaders() });
      if (r.status === 401) return logout();
      const rows = await r.json();
      $("analysisList").innerHTML = rows
        .map((a) => {
          let res = "";
          try {
            if (a.result_json) res = JSON.stringify(JSON.parse(a.result_json), null, 1);
          } catch (e) {
            res = a.result_json;
          }
          return `<li class="border border-slate-800 rounded p-2">#${a.id} patient ${a.patient_id} — <b>${a.status}</b><pre class="text-xs mt-1 whitespace-pre-wrap">${res || "—"}</pre></li>`;
        })
        .join("") || "<li>Aucune analyse</li>";
    }

    function loadAll() {
      loadPatients();
      loadAnalyses();
    }

    async function sendAnalysis() {
      const pid = $("anaPatient").value;
      const f = $("anaFile").files[0];
      if (!pid || !f) return alert("Patient ID + image requis");
      const fd = new FormData();
      fd.append("patient_id", pid);
      fd.append("image", f);
      const r = await fetch("/api/v1/analyses", {
        method: "POST",
        headers: { Authorization: "Bearer " + token() },
        body: fd,
      });
      if (!r.ok) return alert(await r.text());
      alert("Analyse créée — traitement async via RabbitMQ.");
      loadAnalyses();
    }

    $("btnLogin").onclick = login;
    $("btnRegister").onclick = register;
    $("btnLogout").onclick = logout;
    $("btnAddPatient").onclick = addPatient;
    $("btnAnalyze").onclick = sendAnalysis;
    $("btnRefresh").onclick = loadAnalyses;

    if (token()) {
      $("authStatus").textContent = "Session existante.";
      $("appPanel").classList.remove("hidden");
      loadAll();
    }
  </script>
</body>
</html>
